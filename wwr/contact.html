<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | White Water Rafting</title>
  <meta name="description" content="Get in touch with White Water Rafting Co. Find our Cape Town address, phone, email, and contact form for inquiries, reservations, and suggestions.">
  <meta name="author" content="Lunga Isipho Mpho">
  <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <img src="https://via.placeholder.com/150x50.png?text=WWR+Logo" alt="White Water Rafting Logo" class="logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main>
    <h1>Contact Us</h1>

    <!-- Company Information -->
    <section class="company-info">
      <h2>Our Information</h2>
      <p><strong>Address:</strong> 2511 Waterfront, Cape Town, South Africa</p>
      <p><strong>PO BOX:</strong> Cape Town, South Africa</p>
      <p><strong>Phone:</strong> ZA 071 000 0000</p>
      <p><strong>Email:</strong> info@raftingco.com</p>

      <!-- Google Map -->
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3310.745446734925!2d18.421348!3d-33.906909!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1dcc676e26cf3c1b%3A0x36b2c89a3b0ef86d!2sVictoria%20%26%20Alfred%20Waterfront%2C%20Cape%20Town!5e0!3m2!1sen!2sza!4v1632752690000!5m2!1sen!2sza" 
        width="600" 
        height="300" 
        allowfullscreen="" 
        loading="lazy">
      </iframe>
    </section>

    <!-- Employee Profiles -->
    <section class="employees">
      <h2>Meet Our Team</h2>
      <div class="employee-profiles">
        <figure>
          <img src="https://via.placeholder.com/200x200.png?text=Ribo+Thele" alt="Ribo Thele – Lead Guide">
          <figcaption>Ribo Thele – Lead Guide</figcaption>
        </figure>
        <figure>
          <img src="https://via.placeholder.com/200x200.png?text=Faith+Hope" alt="Faith Hope – Reservations Manager">
          <figcaption>Faith Hope – Reservations Manager</figcaption>
        </figure>
        <figure>
          <img src="https://via.placeholder.com/200x200.png?text=Darius+Koek" alt="Darius Koek – Safety Officer">
          <figcaption>Darius Koek – Safety Officer</figcaption>
        </figure>
      </div>
    </section>

    <!-- Contact Form -->
    <section class="contact-form">
      <h2>Send Us a Message</h2>
      <form>
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <fieldset>
          <legend>Purpose of Message</legend>
          <label><input type="radio" name="purpose" value="general" required> General Inquiry</label>
          <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
          <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>
        </fieldset>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <label><input type="checkbox" name="subscribe"> Please subscribe me to the monthly newsletter</label>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 White Water Rafting Co. | Lunga Isipho Mpho</p>
    <nav class="socialmedia">
      <a href="https://facebook.com">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" alt="Facebook Icon" width="24">
      </a>
      <a href="https://linkedin.com">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png" alt="LinkedIn Icon" width="24">
      </a>
      <a href="https://instagram.com">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram Icon" width="24">
      </a>
    </nav>
  </footer>
</body>
</html>
