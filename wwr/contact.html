<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | White Water Rafting</title>
  <meta name="description" content="Get in touch with White Water Rafting Co. Find our address, phone, email, and contact form for inquiries, reservations, and suggestions.">
  <meta name="author" content="Lunga Isipho Mpho">
  <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <img src="https://via.placeholder.com/150x50.png?text=WWR+Logo" alt="White Water Rafting Logo" class="logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main>
    <h1>Contact Us</h1>

    <!-- Company Info -->
    <section class="company-info">
      <h2>Our Information</h2>
      <p><strong>Address:</strong> 123 River Road, Adventure City, CO 80000</p>
      <p><strong>Phone:</strong> +1 (800) 555-RAFT</p>
      <p><strong>Email:</strong> info@raftingco.com</p>

      <!-- Embedded Google Map -->
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.186394977273!2d-122.419415!3d37.774929!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085809c77a7dfc9%3A0xdeb7e7435c3f9c71!2sRiver%20Rafting!5e0!3m2!1sen!2sus!4v1614716400000!5m2!1sen!2sus" 
        width="600" 
        height="300" 
        allowfullscreen="" 
        loading="lazy">
      </iframe>
    </section>

    <!-- Employees -->
    <section class="employees">
      <h2>Meet Our Team</h2>
      <div class="employee-profiles">
        <figure>
          <img src="https://via.placeholder.com/200x200.png?text=Guide+1" alt="John Doe - Lead Guide">
          <figcaption>John Doe – Lead Guide</figcaption>
        </figure>
        <figure>
          <img src="https://via.placeholder.com/200x200.png?text=Manager" alt="Jane Smith - Reservations Manager">
          <figcaption>Jane Smith – Reservations Manager</figcaption>
        </figure>
        <figure>
          <img src="https://via.placeholder.com/200x200.png?text=Safety" alt="Carlos Reyes - Safety Officer">
          <figcaption>Carlos Reyes – Safety Officer</figcaption>
        </figure>
      </div>
    </section>

    <!-- Contact Form -->
    <section class="contact-form">
      <h2>Send Us a Message</h2>
      <form>
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <fieldset>
          <legend>Purpose of Message</legend>
          <label><input type="radio" name="purpose" value="general" required> General Inquiry</label>
          <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
          <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>
        </fieldset>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <label><input type="checkbox" name="subscribe"> Please subscribe me to the monthly newsletter</label>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 White Water Rafting Co. | Lunga Isipho Mpho</p>
    <nav class="socialmedia">
      <a href="https://facebook.com">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" alt="Facebook Icon" width="24">
      </a>
      <a href="https://linkedin.com">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png" alt="LinkedIn Icon" width="24">
      </a>
      <a href="https://instagram.com">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram Icon" width="24">
      </a>
    </nav>
  </footer>
</body>
</html>
